<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ServiceRadar Dashboard WASM Harness</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        background: Canvas;
        color: CanvasText;
      }

      main {
        display: grid;
        gap: 16px;
        max-width: 1120px;
        margin: 0 auto;
        padding: 24px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        font-weight: 600;
      }

      input {
        min-height: 36px;
        border: 1px solid color-mix(in srgb, CanvasText 22%, transparent);
        border-radius: 6px;
        padding: 0 10px;
        background: Canvas;
        color: CanvasText;
      }

      button {
        width: max-content;
        min-height: 36px;
        border: 0;
        border-radius: 6px;
        padding: 0 14px;
        background: #2563eb;
        color: white;
        font-weight: 700;
      }

      pre {
        min-height: 220px;
        overflow: auto;
        border: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
        border-radius: 8px;
        padding: 14px;
        background: color-mix(in srgb, CanvasText 6%, transparent);
      }

      .grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      .status {
        min-height: 22px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ServiceRadar Dashboard Package Harness</h1>
      <div class="grid">
        <label>
          Manifest JSON
          <input id="manifest" />
        </label>
        <label>
          Renderer asset
          <input id="wasm" />
        </label>
        <label>
          Sample Frames JSON
          <input id="frames" />
        </label>
        <label>
          Settings JSON
          <input id="settings" />
        </label>
      </div>
      <button id="run" type="button">Run Renderer</button>
      <div id="status" class="status"></div>
      <pre id="output"></pre>
    </main>
    <script type="module" src="./harness.js"></script>
  </body>
</html>
